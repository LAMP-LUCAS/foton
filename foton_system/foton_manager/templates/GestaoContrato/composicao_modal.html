<!-- templates/GestaoOrcamento/composicao_modal.html -->
{% extends "base.html" %}

{% block content %}

<div class="modal fade" id="composicaoModal" tabindex="-1" role="dialog" aria-labelledby="composicaoModalLabel" aria-hidden="true">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="composicaoModalLabel">Composição de Custo</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <!-- Conteúdo da composição de custo -->
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Fechar</button>
          <button type="button" class="btn btn-primary">Salvar</button>
        </div>
      </div>
    </div>
  </div>
  {% endblock %}
