<html>
<head>
    <title>Foton</title>
    <!-- Incluir links para os arquivos CSS e JS do Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-md navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'homepage' %}">Foton</a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'homepage' %}">Início</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'GestaoContrato:GestaoContrato_home' %}">Gestão de Contratos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'GestaoCliente:GestaoCliente_home' %}">Gestão de Clientes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'GestaoOrcamento:GestaoOrcamento_home' %}">Gestão de Orçamentos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Conteúdo específico de cada página será incluído nas páginas HTML individuais -->
    <div class="container mt-4">
        {% block content %}
        {% endblock %}
    </div>

    <footer class="mt-4">
        <center>
            <a class="footer" href="{% url 'homepage' %}">Início</a>
            <p class="footer">design by lamp</p>
        </center>
    </footer>

    <!-- Incluir link para o arquivo JS do Bootstrap -->
    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>
</body>
</html>
