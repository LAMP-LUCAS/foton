{% extends "base.html" %}

{% block content %}
<div class="container">
    <h1>Excluir Cliente</h1>
    <p>Você tem certeza que deseja excluir o cliente '{{ cliente.nome }}'?</p>
    <form method="post" action="{% url 'GestaoCliente:excluir' cliente.id %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Confirmar Exclusão</button>
    </form>
</div>
{% endblock %}
